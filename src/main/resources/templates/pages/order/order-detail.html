<!-- ===== Modal: Order Detail ===== -->
<div class="modal fade"
     id="orderDetailModal"
     tabindex="-1"
     aria-hidden="true"
     th:fragment="modal">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Order Detail</h5>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <div th:if="${detailOrder == null}" class="alert alert-warning mb-0">
                    Order not found or no data to display.
                </div>

                <div th:if="${detailOrder != null}"
                     th:with="isTerminalDetail=${detailOrder.status == 'COMPLETED' or detailOrder.status == 'CANCELLED'}"
                     class="detail-card">

                    <table class="table table-bordered mb-0">
                        <tr>
                            <th style="width: 180px;">Order ID</th>
                            <td th:text="${'#' + detailOrder.id}"></td>
                        </tr>
                        <tr>
                            <th>Table</th>
                            <td th:text="${detailOrder.tableName == null or #strings.isEmpty(detailOrder.tableName) ? '-' : detailOrder.tableName}"></td>
                        </tr>
                        <tr>
                            <th>Customer</th>
                            <td th:text="${detailOrder.customerName == null or #strings.isEmpty(detailOrder.customerName) ? 'Guest' : detailOrder.customerName}"></td>
                        </tr>
                        <tr>
                            <th>Status</th>
                            <td>
                                <span class="badge"
                                      th:classappend="${detailOrder.status == 'COMPLETED'} ? ' bg-success'
                                                      : (${detailOrder.status == 'PENDING'} ? ' bg-warning text-dark'
                                                      : (${detailOrder.status == 'CANCELLED'} ? ' bg-danger' : ' bg-secondary'))"
                                      th:text="${detailOrder.status}">
                                </span>
                            </td>
                        </tr>
                        <tr>
                            <th>Created At</th>
                            <td th:text="${detailOrder.createdAt == null ? '-' : detailOrder.createdAtFormatted}"></td>
                        </tr>
                        <tr>
                            <th>Total Amount</th>
                            <td th:text="${#numbers.formatDecimal(detailOrder.totalAmount, 1, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        </tr>
                        <tr>
                            <th>Final Amount</th>
                            <td th:text="${#numbers.formatDecimal((detailOrder.finalAmount == null ? detailOrder.totalAmount : detailOrder.finalAmount), 1, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                        </tr>
                        <tr>
                            <th>Note</th>
                            <td th:text="${detailOrder.note == null or #strings.isEmpty(detailOrder.note) ? '-' : detailOrder.note}"></td>
                        </tr>
                        <tr>
                            <th>Order Items</th>
                            <td>
                                <span th:if="${detailOrderItems == null or #lists.isEmpty(detailOrderItems)}"
                                      class="text-muted">
                                    No drinks in this order.
                                </span>

                                <div th:if="${detailOrderItems != null and !#lists.isEmpty(detailOrderItems)}"
                                     class="table-responsive">
                                    <table class="table table-bordered table-sm align-middle mb-0 order-detail-items-table">
                                        <thead class="table-light text-center">
                                        <tr>
                                            <th style="width: 60px;">#</th>
                                            <th class="text-start">Drink</th>
                                            <th style="width: 90px;">Qty</th>
                                            <th style="width: 150px;">Unit Price</th>
                                            <th style="width: 150px;">Subtotal</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr class="text-center"
                                            th:each="it, loop : ${detailOrderItems}">
                                            <td th:text="${loop.index + 1}"></td>
                                            <td class="text-start">
                                                <span th:text="${it.drinkName}"></span>
                                                <span th:if="${it.pricingType == 'POINT_REWARD'}"
                                                      class="badge bg-info text-dark ms-2">
                                                        Free Drink
                                                    </span>
                                            </td>
                                            <td th:text="${it.quantity}"></td>
                                            <td th:text="${#numbers.formatDecimal(it.unitPrice, 1, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                            <td th:text="${#numbers.formatDecimal(it.subtotal, 1, 'COMMA', 0, 'POINT') + ' ₫'}"></td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </td>
                        </tr>
                    </table>

                    <div class="detail-actions">
                        <div>
                            <button th:if="${detailOrder.status == 'PENDING'}"
                                    type="button"
                                    class="btn btn-danger px-3 btn-open-confirm"
                                    data-confirm-title="Cancel Order"
                                    data-confirm-message="Are you sure you want to cancel this order?"
                                    data-confirm-action="cancel"
                                    data-confirm-btn-class="btn-danger"
                                    th:data-confirm-order-id="${detailOrder.id}">
                                <i class="fa-solid fa-ban me-1"></i> Cancel Order
                            </button>
                        </div>

                        <div class="actions-right">
                            <a th:if="${!isTerminalDetail}"
                               th:href="@{/order-management(view='edit', id=${detailOrder.id}, page=${pageNo}, keyword=${kw})}"
                               class="btn btn-warning px-3">
                                <i class="fa-regular fa-pen-to-square me-1"></i> Edit Order
                            </a>

                            <a th:href="@{/order-management(page=${pageNo}, keyword=${kw})}"
                               class="btn btn-outline-secondary">
                                Close
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

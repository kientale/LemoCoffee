<!-- ===== Modal: Edit Order ===== -->
<div class="modal fade"
     id="editOrderModal"
     tabindex="-1"
     aria-hidden="true"
     th:fragment="modal">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <!-- Edit Modal Header -->
            <div class="modal-header">
                <h5 class="modal-title">Edit Order</h5>
            </div>

            <!-- Edit Modal Body -->
            <div class="modal-body">
                <form th:action="@{/order-management}"
                      method="post"
                      id="editOrderForm"
                      data-mode="ajax">

                    <input type="hidden" name="action" value="update" />
                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />
                    <input type="hidden"
                           name="id"
                           th:value="${editOrder == null or editOrder.id == null ? '' : editOrder.id}" />
                    <input type="hidden" name="page" th:value="${pageNo}" />
                    <input type="hidden" name="keyword" th:value="${kw}" />

                    <!-- Selected Table/Customer -->
                    <input type="hidden"
                           name="tableId"
                           id="selectedTableIdEdit"
                           th:value="${editOrder == null or editOrder.tableId == null ? '' : editOrder.tableId}" />

                    <input type="hidden"
                           name="customerId"
                           id="selectedCustomerIdEdit"
                           th:value="${editOrder == null or editOrder.customerId == null ? '' : editOrder.customerId}" />

                    <!-- Selected Drinks JSON -->
                    <input type="hidden"
                           name="selectedDrinksJsonEdit"
                           id="selectedDrinksJsonEdit"
                           th:value="${selectedDrinksJsonEdit == null or #strings.isEmpty(selectedDrinksJsonEdit) ? '[]' : selectedDrinksJsonEdit}" />

                    <div id="selectedDrinkHiddenInputsEdit"></div>

                    <!-- Server Errors -->
                    <div class="alert alert-danger"
                         th:if="${errors != null and !#lists.isEmpty(errors) and showEditModal}">
                        <ul class="mb-0">
                            <li th:each="e : ${errors}" th:text="${e}"></li>
                        </ul>
                    </div>

                    <!-- Client Errors -->
                    <div class="alert alert-danger d-none" id="updateOrderClientErrors">
                        <ul class="mb-0" id="updateOrderClientErrorsList"></ul>
                    </div>

                    <!-- Edit Form Fields -->
                    <div class="row g-3">
                        <!-- Table Picker -->
                        <div class="col-md-12">
                            <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                                <label class="form-label fw-semibold mb-0">Table</label>

                                <div class="d-flex gap-2">
                                    <button type="button" class="btn btn-success btn-sm" id="btnOpenTableModalEdit">
                                        <span class="btn-text">
                                            <i class="fa-solid fa-chair me-1"></i> Choose Table
                                        </span>
                                        <span class="spinner-border spinner-border-sm d-none" id="tableOpenSpinnerEdit"></span>
                                    </button>

                                    <button type="button" class="btn btn-outline-danger btn-sm" id="btnClearTableEdit">
                                        <i class="fa-solid fa-broom me-1"></i> Clear
                                    </button>
                                </div>
                            </div>

                            <input type="text"
                                   id="selectedTableNameEdit"
                                   name="tableName"
                                   class="form-control"
                                   placeholder="No table selected"
                                   th:value="${editOrder == null or editOrder.tableName == null ? '' : editOrder.tableName}"
                                   readonly>

                            <small class="text-muted">Each order can only belong to one table.</small>
                        </div>

                        <!-- Customer Picker -->
                        <div class="col-md-12">
                            <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                                <label class="form-label fw-semibold mb-0">Customer</label>

                                <div class="d-flex gap-2">
                                    <button type="button" class="btn btn-success btn-sm" id="btnOpenCustomerModalEdit">
                                        <span class="btn-text">
                                            <i class="fa-solid fa-user me-1"></i> Choose Customer
                                        </span>
                                        <span class="spinner-border spinner-border-sm d-none" id="customerOpenSpinnerEdit"></span>
                                    </button>

                                    <button type="button" class="btn btn-warning btn-sm" id="btnOpenNewCustomerModalEdit">
                                        <span class="btn-text">
                                            <i class="fa-solid fa-user-plus me-1"></i> New Customer
                                        </span>
                                        <span class="spinner-border spinner-border-sm d-none" id="newCustomerOpenSpinnerEdit"></span>
                                    </button>

                                    <button type="button" class="btn btn-outline-danger btn-sm" id="btnClearCustomerEdit">
                                        <i class="fa-solid fa-broom me-1"></i> Clear
                                    </button>
                                </div>
                            </div>

                            <input type="text"
                                   id="selectedCustomerNameEdit"
                                   name="customerName"
                                   class="form-control"
                                   placeholder="No customer selected"
                                   th:value="${editOrder == null or editOrder.customerName == null ? '' : editOrder.customerName}"
                                   readonly>

                            <small class="text-muted">Select customer to update loyalty and order history.</small>
                        </div>

                        <!-- Note -->
                        <div class="col-md-12">
                            <label class="form-label">Note</label>
                            <textarea name="note"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Enter note for this order..."
                                      th:text="${editOrder != null and editOrder.note != null ? editOrder.note : ''}"></textarea>
                        </div>

                        <!-- Selected Drinks -->
                        <div class="mt-4">
                            <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                                <h6 class="fw-bold mb-0">Selected Drinks</h6>

                                <div class="d-flex gap-2">
                                    <button type="button" class="btn btn-success btn-sm" id="btnOpenDrinkModalEdit">
                                        <span class="btn-text">
                                            <i class="fa-solid fa-plus me-1"></i> Add Drink
                                        </span>
                                        <span class="spinner-border spinner-border-sm d-none" id="drinkOpenSpinnerEdit"></span>
                                    </button>

                                    <button type="button" class="btn btn-outline-danger btn-sm" id="btnClearSelectedDrinksEdit">
                                        <i class="fa-solid fa-broom me-1"></i> Clear
                                    </button>
                                </div>
                            </div>

                            <div class="selected-drink-table-container">
                                <div class="selected-drink-table-body">
                                    <table class="table table-bordered table-hover align-middle mb-0 table-striped">
                                        <thead class="table-light text-center">
                                        <tr style="height: 52px;">
                                            <th style="width: 70px;">#</th>
                                            <th class="text-start">Drink Name</th>
                                            <th style="width: 140px;">Unit Price</th>
                                            <th style="width: 190px;">Quantity</th>
                                            <th style="width: 150px;">Subtotal</th>
                                            <th style="width: 120px;">Action</th>
                                        </tr>
                                        </thead>

                                        <tbody id="selectedDrinkTbodyEdit">
                                        <tr id="drinkEmptyRowEdit">
                                            <td colspan="6" class="text-center text-muted py-4">No drink selected</td>
                                        </tr>
                                        </tbody>

                                        <template id="selectedDrinkRowTplEdit">
                                            <tr class="text-center" data-id="">
                                                <td class="col-no"></td>
                                                <td class="text-start fw-semibold col-name"></td>
                                                <td class="col-price fw-semibold text-success"></td>

                                                <td>
                                                    <div class="qty-stepper" role="group" aria-label="Drink quantity controls">
                                                        <button type="button"
                                                                class="btn btn-outline-secondary btn-sm qty-btn qty-decrease"
                                                                aria-label="Decrease quantity"
                                                                title="Decrease quantity">
                                                            <i class="fa-solid fa-minus"></i>
                                                        </button>

                                                        <input type="number"
                                                               class="form-control form-control-sm text-center selected-drink-qty"
                                                               min="1"
                                                               step="1"
                                                               inputmode="numeric"
                                                               value="1">

                                                        <button type="button"
                                                                class="btn btn-outline-secondary btn-sm qty-btn qty-increase"
                                                                aria-label="Increase quantity"
                                                                title="Increase quantity">
                                                            <i class="fa-solid fa-plus"></i>
                                                        </button>
                                                    </div>
                                                </td>

                                                <td class="col-subtotal fw-semibold"></td>

                                                <td>
                                                    <button type="button"
                                                            class="btn btn-outline-danger btn-sm btn-remove-selected-drink"
                                                            data-id="">
                                                        <i class="fa-solid fa-trash"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        </template>
                                    </table>
                                </div>
                            </div>

                            <!-- Selected Drink Pagination -->
                            <div class="mt-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                                <div class="fw-semibold">
                                    Total:
                                    <span id="orderTotalPreviewEdit" class="text-success">0 &#273;</span>
                                </div>

                                <div class="d-flex justify-content-end align-items-center gap-2 d-none" id="selectedDrinkPagerEdit">
                                    <button type="button" class="btn btn-outline-secondary btn-sm" id="btnSelDrinkPrevEdit">Prev</button>
                                    <span class="fw-semibold small" id="selDrinkPageInfoEdit">1 / 1</span>
                                    <button type="button" class="btn btn-outline-secondary btn-sm" id="btnSelDrinkNextEdit">Next</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Edit Modal Footer Actions -->
                    <div class="mt-4 text-end">
                        <a th:href="@{/order-management(page=${pageNo}, keyword=${kw})}"
                           class="btn btn-outline-secondary">
                            Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">Update</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

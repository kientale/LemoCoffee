<!-- ===== Modal: Add Order ===== -->
<div class="modal fade"
     id="addOrderModal"
     tabindex="-1"
     aria-hidden="true"
     th:fragment="modal">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-scrollable">
        <div class="modal-content">
            <!-- Add Modal Header -->
            <div class="modal-header">
                <h5 class="modal-title">Add New Order</h5>
            </div>

            <!-- Add Modal Body -->
            <div class="modal-body">
                <form th:action="@{/order-management}"
                      method="post"
                      id="createOrderForm"
                      data-mode="ajax">

                    <input type="hidden" name="action" value="create" />
                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />
                    <input type="hidden" name="page" th:value="${pageNo}" />
                    <input type="hidden" name="keyword" th:value="${kw}" />

                    <!-- Selected Table/Customer -->
                    <input type="hidden"
                           name="tableId"
                           id="selectedTableId"
                           th:value="${formData == null or formData.tableId == null ? '' : formData.tableId}" />

                    <input type="hidden"
                           name="customerId"
                           id="selectedCustomerId"
                           th:value="${formData == null or formData.customerId == null ? '' : formData.customerId}" />

                    <!-- Selected Drinks JSON -->
                    <input type="hidden"
                           name="selectedDrinksJson"
                           id="selectedDrinksJson"
                           th:value="${selectedDrinksJson == null or #strings.isEmpty(selectedDrinksJson) ? '[]' : selectedDrinksJson}" />

                    <div id="selectedDrinkHiddenInputs"></div>

                    <!-- Server Errors -->
                    <div class="alert alert-danger"
                         th:if="${errors != null and !#lists.isEmpty(errors)}">
                        <ul class="mb-0">
                            <li th:each="e : ${errors}" th:text="${e}"></li>
                        </ul>
                    </div>

                    <!-- Client Errors -->
                    <div class="alert alert-danger d-none" id="createOrderClientErrors">
                        <ul class="mb-0" id="createOrderClientErrorsList"></ul>
                    </div>

                    <!-- Order Form Fields -->
                    <div class="row g-3">
                        <div class="col-12">
                            <div class="order-party-grid">
                                <!-- Table Picker -->
                                <div class="order-party-card">
                                    <div class="order-party-card-header d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                                        <label class="form-label fw-semibold mb-0">Table</label>

                                        <div class="order-party-card-actions d-flex gap-2 flex-wrap justify-content-end">
                                            <button type="button" class="btn btn-success btn-sm" id="btnOpenTableModal">
                                                <span class="btn-text">
                                                    <i class="fa-solid fa-chair me-1"></i> Choose Table
                                                </span>
                                                <span class="spinner-border spinner-border-sm d-none" id="tableOpenSpinner"></span>
                                            </button>

                                            <button type="button" class="btn btn-outline-danger btn-sm" id="btnClearTable">
                                                <i class="fa-solid fa-broom me-1"></i> Clear
                                            </button>
                                        </div>
                                    </div>

                                    <input type="text"
                                           id="selectedTableName"
                                           name="tableName"
                                           class="form-control"
                                           placeholder="No table selected"
                                           th:value="${formData == null or formData.tableName == null ? '' : formData.tableName}"
                                           readonly>

                                    <small class="text-muted">Each order can only belong to one table.</small>
                                </div>

                                <!-- Customer Picker -->
                                <div class="order-party-card">
                                    <div class="order-party-card-header d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                                        <label class="form-label fw-semibold mb-0">Customer</label>

                                        <div class="order-party-card-actions d-flex gap-2 flex-wrap justify-content-end">
                                            <button type="button" class="btn btn-success btn-sm" id="btnOpenCustomerModal">
                                                <span class="btn-text">
                                                    <i class="fa-solid fa-user me-1"></i> Choose Customer
                                                </span>
                                                <span class="spinner-border spinner-border-sm d-none" id="customerOpenSpinner"></span>
                                            </button>

                                            <button type="button" class="btn btn-warning btn-sm" id="btnOpenNewCustomerModal">
                                                <span class="btn-text">
                                                    <i class="fa-solid fa-user-plus me-1"></i> New Customer
                                                </span>
                                                <span class="spinner-border spinner-border-sm d-none" id="newCustomerOpenSpinner"></span>
                                            </button>

                                            <button type="button" class="btn btn-outline-danger btn-sm" id="btnClearCustomer">
                                                <i class="fa-solid fa-broom me-1"></i> Clear
                                            </button>
                                        </div>
                                    </div>

                                    <input type="text"
                                           id="selectedCustomerName"
                                           name="customerName"
                                           class="form-control"
                                           placeholder="No customer selected"
                                           th:value="${formData == null or formData.customerName == null ? '' : formData.customerName}"
                                           readonly>

                                    <small class="text-muted">Customer ID is submitted for loyalty and order history.</small>
                                </div>
                            </div>
                        </div>

                        <!-- Note -->
                        <div class="col-12">
                            <label class="form-label">Note</label>
                            <textarea name="note"
                                      class="form-control"
                                      rows="3"
                                      placeholder="Enter note for this order..."
                                      th:text="${formData != null and formData.note != null ? formData.note : ''}"></textarea>
                        </div>

                        <!-- Selected Drinks -->
                        <div class="col-12 mt-4">
                            <div class="d-flex justify-content-between align-items-center mb-2 flex-wrap gap-2">
                                <h6 class="fw-bold mb-0">Selected Drinks</h6>

                                <div class="d-flex gap-2">
                                    <button type="button" class="btn btn-success btn-sm" id="btnOpenDrinkModal">
                                        <span class="btn-text">
                                            <i class="fa-solid fa-plus me-1"></i> Add Drink
                                        </span>
                                        <span class="spinner-border spinner-border-sm d-none" id="drinkOpenSpinner"></span>
                                    </button>

                                    <button type="button" class="btn btn-outline-danger btn-sm" id="btnClearSelectedDrinks">
                                        <i class="fa-solid fa-broom me-1"></i> Clear
                                    </button>
                                </div>
                            </div>

                            <div class="selected-drink-table-container">
                                <div class="selected-drink-table-body">
                                    <table class="table table-bordered table-hover align-middle mb-0 table-striped">
                                        <thead class="table-light text-center">
                                        <tr style="height: 52px;">
                                            <th style="width: 70px;">#</th>
                                            <th class="text-start">Drink Name</th>
                                            <th style="width: 140px;">Unit Price</th>
                                            <th style="width: 190px;">Quantity</th>
                                            <th style="width: 150px;">Subtotal</th>
                                            <th style="width: 120px;">Action</th>
                                        </tr>
                                        </thead>

                                        <tbody id="selectedDrinkTbody">
                                        <tr id="drinkEmptyRow">
                                            <td colspan="6" class="text-center text-muted py-4">No drink selected</td>
                                        </tr>
                                        </tbody>

                                        <template id="selectedDrinkRowTpl">
                                            <tr class="text-center" data-id="">
                                                <td class="col-no"></td>
                                                <td class="text-start fw-semibold col-name"></td>
                                                <td class="col-price fw-semibold text-success"></td>

                                                <td>
                                                    <div class="qty-stepper" role="group" aria-label="Drink quantity controls">
                                                        <button type="button"
                                                                class="btn btn-outline-secondary btn-sm qty-btn qty-decrease"
                                                                aria-label="Decrease quantity"
                                                                title="Decrease quantity">
                                                            <i class="fa-solid fa-minus"></i>
                                                        </button>

                                                        <input type="number"
                                                               class="form-control form-control-sm text-center selected-drink-qty"
                                                               min="1"
                                                               step="1"
                                                               inputmode="numeric"
                                                               value="1">

                                                        <button type="button"
                                                                class="btn btn-outline-secondary btn-sm qty-btn qty-increase"
                                                                aria-label="Increase quantity"
                                                                title="Increase quantity">
                                                            <i class="fa-solid fa-plus"></i>
                                                        </button>
                                                    </div>
                                                </td>

                                                <td class="col-subtotal fw-semibold"></td>

                                                <td>
                                                    <button type="button"
                                                            class="btn btn-outline-danger btn-sm btn-remove-selected-drink"
                                                            data-id="">
                                                        <i class="fa-solid fa-trash"></i>
                                                    </button>
                                                </td>
                                            </tr>
                                        </template>
                                    </table>
                                </div>
                            </div>

                            <!-- Selected Drink Pagination -->
                            <div class="mt-3 d-flex justify-content-between align-items-center flex-wrap gap-2">
                                <div class="fw-semibold">
                                    Total:
                                    <span id="orderTotalPreview" class="text-success">0 &#273;</span>
                                </div>

                            </div>
                        </div>
                    </div>

                    <!-- Add Modal Footer Actions -->
                    <div class="order-form-footer">
                        <div class="order-form-footer-pagination d-flex align-items-center gap-2 d-none" id="selectedDrinkPager">
                            <button type="button" class="btn btn-outline-secondary" id="btnSelDrinkPrev">Prev</button>
                            <span class="fw-semibold small" id="selDrinkPageInfo">1 / 1</span>
                            <button type="button" class="btn btn-outline-secondary" id="btnSelDrinkNext">Next</button>
                        </div>

                        <div class="order-form-footer-actions">
                            <a th:href="@{/order-management(page=${pageNo}, keyword=${kw})}"
                               class="btn btn-outline-secondary">
                                Cancel
                            </a>

                            <button type="submit" class="btn btn-primary">Create</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

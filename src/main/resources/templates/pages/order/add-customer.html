<th:block th:fragment="modal">
<!-- ===== Modal: Customer Picker ===== -->
<div class="modal fade"
     id="customerPickerModal"
     tabindex="-1"
     aria-labelledby="customerPickerModalLabel"
     aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-scrollable">
        <div class="modal-content">
            <!-- Picker Modal Header -->
            <div class="modal-header">
                <h5 class="modal-title" id="customerPickerModalLabel">
                    <i class="fa-solid fa-user-group me-2"></i> Select Customer
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"></button>
            </div>

            <!-- Picker Modal Body -->
            <div class="modal-body">
                <div class="picker-card">
                    <!-- Search Toolbar -->
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                        <form id="customerPickerSearchForm"
                              th:action="@{/order-management}"
                              method="get"
                              class="d-flex align-items-center gap-2 flex-wrap"
                              role="search">

                            <input type="hidden" name="view" value="create" />
                            <input type="hidden" name="openCustomerModal" value="true" />
                            <input type="hidden" name="customerPage" id="customerPageInput" value="1" />

                            <span class="text-muted fw-semibold me-1">Search</span>

                            <input type="text"
                                   name="customerKeyword"
                                   class="form-control"
                                   placeholder="Enter customer name..."
                                   th:value="${param.customerKeyword}"
                                   style="width: 260px;"
                                   autocomplete="off">

                            <button type="submit" class="btn btn-primary fw-semibold">
                                <i class="fa-solid fa-magnifying-glass me-1"></i> Search
                            </button>

                            <button type="button"
                                    class="btn btn-outline-secondary"
                                    id="btnResetCustomerSearch">
                                Reset
                            </button>
                        </form>
                    </div>

                    <!-- AJAX Error -->
                    <div id="customerPickerError" class="alert alert-danger d-none"></div>

                    <!-- AJAX Loading -->
                    <div id="customerPickerLoading" class="text-center text-muted py-4 d-none">
                        <div class="spinner-border" role="status" aria-label="Loading"></div>
                        <div class="mt-2">Loading customers...</div>
                    </div>

                    <!-- AJAX Fragment Container -->
                    <div id="customerPickerContainer"
                         th:data-endpoint="@{/order-management}"></div>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- ===== Modal: Create Customer (From Order) ===== -->
<div class="modal fade"
     id="orderCreateCustomerModal"
     tabindex="-1"
     aria-labelledby="orderCreateCustomerModalLabel"
     aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-scrollable">
        <div class="modal-content">
            <!-- Create Modal Header -->
            <div class="modal-header">
                <h5 class="modal-title" id="orderCreateCustomerModalLabel">Add New Customer</h5>
                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"></button>
            </div>

            <!-- Create Modal Body -->
            <div class="modal-body">
                <form id="orderCreateCustomerForm"
                      th:action="@{/order-management/create-customer}"
                      method="post">

                    <input type="hidden"
                           th:if="${_csrf != null}"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"
                           th:data-header-name="${_csrf.headerName}"
                           data-csrf-token="true" />

                    <input type="hidden" name="owner" id="orderCreateCustomerOwner" value="add" />

                    <!-- Client Errors -->
                    <div class="alert alert-danger d-none" id="orderCreateCustomerErrors">
                        <ul class="mb-0" id="orderCreateCustomerErrorsList"></ul>
                    </div>

                    <!-- Customer Form Fields -->
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name</label>
                            <input type="text"
                                   name="fullName"
                                   class="form-control"
                                   placeholder="Enter full name"
                                   autocomplete="off">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Phone</label>
                            <input type="text"
                                   name="phone"
                                   class="form-control"
                                   placeholder="Enter phone number"
                                   autocomplete="off"
                                   inputmode="numeric"
                                   maxlength="11">
                        </div>
                    </div>

                    <!-- Create Modal Footer Actions -->
                    <div class="mt-4 text-end d-flex justify-content-end gap-2">
                        <button type="button"
                                class="btn btn-outline-secondary"
                                data-bs-dismiss="modal">
                            Cancel
                        </button>

                        <button type="submit"
                                class="btn btn-primary"
                                id="btnSubmitCreateCustomer">
                            <span class="btn-text">Create</span>
                            <span class="spinner-border spinner-border-sm d-none"
                                  id="createCustomerSubmitSpinner"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</th:block>

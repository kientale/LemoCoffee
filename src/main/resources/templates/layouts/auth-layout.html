<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LemoCoffee | Auth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet"
          th:href="@{/css/layout/auth-layout.css(v=2)}">
</head>

<body class="auth-layout">

<main class="container">
    <th:block th:if="${content != null}">
        <div th:replace="~{${content} :: content}"></div>
    </th:block>
</main>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Auth JS -->
<script th:src="@{/js/auth-validate.js(v=1)}" defer></script>
<script th:src="@{/js/toggle-password.js(v=1)}" defer></script>
<script th:src="@{/js/login.js(v=1)}" defer></script>

</body>
</html>

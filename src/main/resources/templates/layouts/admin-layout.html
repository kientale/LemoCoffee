<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin | LemoCoffee</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/fragment/admin/sidebar.css(v=1)}">
    <link rel="stylesheet" th:href="@{/css/page/dashboard.css(v=1)}">

</head>

<body class="bg-light" th:attr="data-context=@{/}">

<!-- NAVBAR -->
<div th:replace="~{common/navbar :: navbar}"></div>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div th:replace="~{common/sidebar :: sidebar}"></div>

        <!-- MAIN CONTENT -->
        <main class="col-md-9 col-lg-10 px-md-4 py-4">
            <th:block th:if="${content != null}">
                <div th:replace="~{${content} :: content}"></div>
            </th:block>
        </main>

    </div>
</div>

<!-- FOOTER -->
<div th:replace="~{common/footer :: footer}"></div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/dashboard.js(v=1)}" defer></script>

</body>
</html>
